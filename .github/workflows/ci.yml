name: CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4

      with:
        python-version: 3.11

    - name: Install deps
      run: |
        pip install -r requirements.txt

    - name: Verify code
      run: |
        python -m compileall .